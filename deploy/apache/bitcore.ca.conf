# Laravel application virtual host for bitcore.ca (Homebrew Apache on macOS)
<VirtualHost *:8080>
    ServerName bitcore.ca
    ServerAlias www.bitcore.ca
    DocumentRoot "/Users/kalantar/DB connected App/public"

    <Directory "/Users/kalantar/DB connected App/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "/opt/homebrew/var/log/httpd/bitcore.ca-error_log"
    CustomLog "/opt/homebrew/var/log/httpd/bitcore.ca-access_log" common
</VirtualHost>
