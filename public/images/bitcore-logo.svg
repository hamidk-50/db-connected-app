<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main square built from small cubes -->
  <g fill="#C4B5FD">
    <rect x="18" y="44" width="12" height="12" rx="1.5"/>
    <rect x="34" y="44" width="12" height="12" rx="1.5"/>

    <rect x="18" y="60" width="12" height="12" rx="1.5"/>
    <rect x="34" y="60" width="12" height="12" rx="1.5"/>
    <rect x="50" y="60" width="12" height="12" rx="1.5"/>

    <rect x="18" y="76" width="12" height="12" rx="1.5"/>
    <rect x="34" y="76" width="12" height="12" rx="1.5"/>
    <rect x="50" y="76" width="12" height="12" rx="1.5"/>
  </g>

  <!-- Cubes being added to complete the square -->
  <g fill="#A78BFA">
    <rect x="66" y="30" width="12" height="12" rx="1.5" transform="rotate(35 66 30)"/>
    <rect x="84" y="22" width="12" height="12" rx="1.5" transform="rotate(35 84 22)"/>
    <rect x="76" y="48" width="12" height="12" rx="1.5" transform="rotate(35 76 48)"/>
  </g>

  <!-- Bent line under icon -->
  <path
    d="M24 102 H64 A12 12 0 0 0 76 90 V75"
    stroke="#A78BFA"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
